name: toolchain-contract

on:
  workflow_dispatch:
    inputs:
      include_vercel_sync:
        description: 'Also run the Vercel production alias sync check'
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run toolchain contract checks
        run: npm run check:toolchain:contract:node

      - name: Run toolchain contract tests
        run: npm run test:toolchain:contract

      - name: Run build contract tests
        run: npm run test:build:contracts

      - name: Run Vercel production sync check
        if: ${{ inputs.include_vercel_sync }}
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: npm run check:vercel:production:sync
