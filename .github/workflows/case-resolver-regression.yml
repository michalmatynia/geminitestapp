name: case-resolver-regression

on:
  pull_request:
    paths:
      - 'src/features/case-resolver/**'
      - 'src/features/case-resolver-capture/**'
      - 'src/features/prompt-exploder/**'
      - 'src/features/jobs/workers/caseResolverOcrQueue.ts'
      - 'src/app/api/case-resolver/**'
      - 'e2e/features/case-resolver/**'
      - 'package.json'
      - 'package-lock.json'
  push:
    branches:
      - main
      - master
    paths:
      - 'src/features/case-resolver/**'
      - 'src/features/case-resolver-capture/**'
      - 'src/features/prompt-exploder/**'
      - 'src/features/jobs/workers/caseResolverOcrQueue.ts'
      - 'src/app/api/case-resolver/**'
      - 'e2e/features/case-resolver/**'
      - 'package.json'
      - 'package-lock.json'

env:
  BAZEL_REMOTE_CACHE_URL: ${{ secrets.BAZEL_REMOTE_CACHE_URL }}
  BAZEL_REMOTE_CACHE_HEADER: ${{ secrets.BAZEL_REMOTE_CACHE_HEADER }}
  BAZEL_REMOTE_CACHE_UPLOAD_LOCAL_RESULTS: ${{ github.event_name == 'push' && 'true' || 'false' }}

jobs:
  regression:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Case Resolver regression tests
        run: npm run bazel -- run //:case_resolver_regression

  capture_mapping_e2e:
    if: ${{ secrets.PLAYWRIGHT_E2E_ADMIN_EMAIL != '' && secrets.PLAYWRIGHT_E2E_ADMIN_PASSWORD != '' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run Case Resolver capture-mapping e2e
        env:
          PLAYWRIGHT_E2E_ADMIN_EMAIL: ${{ secrets.PLAYWRIGHT_E2E_ADMIN_EMAIL }}
          PLAYWRIGHT_E2E_ADMIN_PASSWORD: ${{ secrets.PLAYWRIGHT_E2E_ADMIN_PASSWORD }}
        run: npm run bazel -- run //:case_resolver_capture_mapping_e2e
