name: case-resolver-regression

on:
  pull_request:
    paths:
      - 'src/features/case-resolver/**'
      - 'src/features/jobs/workers/caseResolverOcrQueue.ts'
      - 'src/app/api/case-resolver/**'
      - 'package.json'
      - 'package-lock.json'
  push:
    branches:
      - main
      - master
    paths:
      - 'src/features/case-resolver/**'
      - 'src/features/jobs/workers/caseResolverOcrQueue.ts'
      - 'src/app/api/case-resolver/**'
      - 'package.json'
      - 'package-lock.json'

jobs:
  regression:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Case Resolver regression tests
        run: npm run test:case-resolver:regression
