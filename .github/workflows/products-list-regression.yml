name: products-list-regression

on:
  pull_request:
    paths:
      - 'src/features/products/**'
      - 'src/app/api/v2/products/**'
      - 'e2e/features/products/products-category-label.spec.ts'
      - 'e2e/support/admin-auth.ts'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/products-list-regression.yml'
  push:
    branches:
      - main
      - master
    paths:
      - 'src/features/products/**'
      - 'src/app/api/v2/products/**'
      - 'e2e/features/products/products-category-label.spec.ts'
      - 'e2e/support/admin-auth.ts'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/products-list-regression.yml'

env:
  BAZEL_REMOTE_CACHE_URL: ${{ secrets.BAZEL_REMOTE_CACHE_URL }}
  BAZEL_REMOTE_CACHE_HEADER: ${{ secrets.BAZEL_REMOTE_CACHE_HEADER }}
  BAZEL_REMOTE_CACHE_UPLOAD_LOCAL_RESULTS: ${{ github.event_name == 'push' && 'true' || 'false' }}

jobs:
  products_list_category_e2e:
    if: ${{ secrets.PLAYWRIGHT_E2E_ADMIN_EMAIL != '' && secrets.PLAYWRIGHT_E2E_ADMIN_PASSWORD != '' }}
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run Products list category e2e gate
        env:
          PLAYWRIGHT_E2E_ADMIN_EMAIL: ${{ secrets.PLAYWRIGHT_E2E_ADMIN_EMAIL }}
          PLAYWRIGHT_E2E_ADMIN_PASSWORD: ${{ secrets.PLAYWRIGHT_E2E_ADMIN_PASSWORD }}
        run: npm run bazel -- run //:products_list_category_e2e

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: products-list-playwright-artifacts
          if-no-files-found: warn
          path: |
            playwright-report/**
            test-results/**
