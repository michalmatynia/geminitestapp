name: Bazel Toolchain

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".bazelignore"
      - ".bazelrc"
      - ".bazelversion"
      - ".bun-version"
      - ".github/workflows/bazel-toolchain.yml"
      - ".node-version"
      - ".nvmrc"
      - ".tool-versions"
      - "BUILD.bazel"
      - "MODULE.bazel"
      - "REPO.bazel"
      - "bun.lock"
      - "bunfig.toml"
      - "docs/build/**"
      - "docs/platform/bun-support.md"
      - "package-lock.json"
      - "package.json"
      - "scripts/runtime/**"
      - "tools/bazel/**"
      - "tools/js/**"
  push:
    branches:
      - main
    paths:
      - ".bazelignore"
      - ".bazelrc"
      - ".bazelversion"
      - ".bun-version"
      - ".github/workflows/bazel-toolchain.yml"
      - ".node-version"
      - ".nvmrc"
      - ".tool-versions"
      - "BUILD.bazel"
      - "MODULE.bazel"
      - "REPO.bazel"
      - "bun.lock"
      - "bunfig.toml"
      - "docs/build/**"
      - "docs/platform/bun-support.md"
      - "package-lock.json"
      - "package.json"
      - "scripts/runtime/**"
      - "tools/bazel/**"
      - "tools/js/**"

permissions:
  contents: read

jobs:
  bazel-toolchain:
    name: bazel-toolchain
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      BAZEL_REMOTE_CACHE_URL: ${{ secrets.BAZEL_REMOTE_CACHE_URL }}
      BAZEL_REMOTE_CACHE_HEADER: ${{ secrets.BAZEL_REMOTE_CACHE_HEADER }}
      BAZEL_REMOTE_CACHE_UPLOAD_LOCAL_RESULTS: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && '1' || '0' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: '.bun-version'

      - name: Install dependencies
        run: npm ci

      - name: Bazel repo toolchain lane
        run: npm run bazel:toolchain
