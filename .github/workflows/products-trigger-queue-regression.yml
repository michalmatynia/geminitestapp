name: products-trigger-queue-regression

on:
  pull_request:
    paths:
      - 'src/features/products/**'
      - 'src/features/ai/ai-paths/**'
      - 'src/shared/contracts/ai-paths.ts'
      - 'src/shared/lib/query-invalidation.ts'
      - 'src/shared/lib/ai-paths/**'
      - 'e2e/features/products/products-trigger-queue-integration.spec.ts'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/products-trigger-queue-regression.yml'
  push:
    branches:
      - main
      - master
    paths:
      - 'src/features/products/**'
      - 'src/features/ai/ai-paths/**'
      - 'src/shared/contracts/ai-paths.ts'
      - 'src/shared/lib/query-invalidation.ts'
      - 'src/shared/lib/ai-paths/**'
      - 'e2e/features/products/products-trigger-queue-integration.spec.ts'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/products-trigger-queue-regression.yml'

env:
  BAZEL_REMOTE_CACHE_URL: ${{ secrets.BAZEL_REMOTE_CACHE_URL }}
  BAZEL_REMOTE_CACHE_HEADER: ${{ secrets.BAZEL_REMOTE_CACHE_HEADER }}
  BAZEL_REMOTE_CACHE_UPLOAD_LOCAL_RESULTS: ${{ github.event_name == 'push' && 'true' || 'false' }}

jobs:
  trigger_queue_unit:
    timeout-minutes: 20
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run AI Paths trigger-queue unit gate
        run: npm run bazel -- run //:products_trigger_queue_unit

  trigger_queue_e2e:
    needs: trigger_queue_unit
    if: ${{ secrets.PLAYWRIGHT_E2E_ADMIN_EMAIL != '' && secrets.PLAYWRIGHT_E2E_ADMIN_PASSWORD != '' }}
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run AI Paths trigger-queue e2e gate
        env:
          PLAYWRIGHT_E2E_ADMIN_EMAIL: ${{ secrets.PLAYWRIGHT_E2E_ADMIN_EMAIL }}
          PLAYWRIGHT_E2E_ADMIN_PASSWORD: ${{ secrets.PLAYWRIGHT_E2E_ADMIN_PASSWORD }}
        run: npm run bazel -- run //:products_trigger_queue_e2e

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: products-trigger-queue-playwright-artifacts
          if-no-files-found: warn
          path: |
            playwright-report/**
            test-results/**
