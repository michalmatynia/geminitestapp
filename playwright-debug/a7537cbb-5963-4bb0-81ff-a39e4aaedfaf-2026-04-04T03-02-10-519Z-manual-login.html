(function() {
var initialPageViewDone = false;
var brainMediaDebug = window['brainDebug'] || (window['sessionStorage'] && sessionStorage.getItem("brainMediaDebug")=='true');
if(brainMediaDebug) { var debug = console.log.bind(window.console); }
else { var debug = function(){}; }

var dataLayers = [];

debug('[BrainMedia] tag loaded');

function brainPageView(data){
  debug('[BrainMedia] pageView tiggered: ', data);
  if (data == null) { data = {}; }

  initialPageViewDone = true;

  debug('[BrainMedia] pageView passed: ', data);

  var brain_media = new BrainMedia({
    debug: brainMediaDebug,
    article_id_function: function() { return data['contentId'] || window.location.pathname },
    content_function: function (callback) {
      debug('[BrainMedia] contentFunction triggered', data);
      if(data['contentBody']) {
        callback(data['contentBody']);
      } else if(data['contentSelector']) {
        callback(document.querySelector(data['contentSelector']));
      } else {
        callback(document.body);
      }
    },
    collect: 'view', // page view (required for home zipcode)
    categorize: false, // DISABLED - get DEP categories + add to page view pixel
    user_profile: 'idfree-tradera', // get DEP user profile (home zipcode based segments)
    page_context: false, // DISABLED - get iab categories for current page
    exports: {
      bidder_filters: {
      },
      pubmatic: false,
      adform_idfree: false,
      google: true,
      prebid_ortb2: true,
      xandr: false,
      adform: false,
      global_var: 'brain_idfree_keywords',
      callback: function(keywords) {
        if(localStorage) {
          localStorage.setItem('brain_idfree_keywords', keywords.join('|'));
        }
        window.brainData.push(['triggerBrainKeywords', keywords, true])
      }
    }
  });

  if(data['contentCategories']) {
  brain_media.addData({page: {categories: data['contentCategories']}});
  }

let page_data = {};
let search_data = {};
['page_type', 'page_country', 'page_category'].forEach(function(key) {
  if(data[key]) {
    page_data[key] = data[key]
  }
});

['search_term', 'category'].forEach(function(key) {
  if(data[key]) {
    search_data[key] = data[key]
  }
});

if(Object.keys(page_data).length > 0) {
  brain_media.addData({page: page_data});
};

if(Object.keys(search_data).length > 0) {
  brain_media.addData({event: search_data});
};

for (var i = 0, len = dataLayers.length; i < len; i++) {
  brain_media.addData(dataLayers[i]);
}

  brain_media.run();
}

window[window['DEPObject']+'Data'].push(['onContentView', function(data) { debug('[BrainMedia] onContentView: ', data); initialPageViewDone=true; brainPageView(data) }]);
window[window['DEPObject']+'Data'].push(['onPageView', function(data) {  debug('[BrainMedia] onPageView: ', data);  brainPageView(data) }]);
window[window['DEPObject']+'Data'].push(['onSetContext', function(data) {  debug('[BrainMedia] onSetContext: ', data);  dataLayers.push(data); }]);

setTimeout(function() {
  if(!initialPageViewDone) {
    brainData.push(['triggerContentView', {initialView: true}]);
  }
}, 300);
})()
