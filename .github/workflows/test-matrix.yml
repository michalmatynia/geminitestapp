name: tests

on:
  pull_request:
  push:
    branches:
      - main
      - master

env:
  BAZEL_REMOTE_CACHE_URL: ${{ secrets.BAZEL_REMOTE_CACHE_URL }}
  BAZEL_REMOTE_CACHE_HEADER: ${{ secrets.BAZEL_REMOTE_CACHE_HEADER }}
  BAZEL_REMOTE_CACHE_UPLOAD_LOCAL_RESULTS: ${{ github.event_name == 'push' && 'true' || 'false' }}

jobs:
  toolchain-contract:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run toolchain contract checks
        run: npm run check:toolchain:contract:node

      - name: Run toolchain contract tests
        run: npm run test:toolchain:contract

  canonical-sitewide:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run site-wide canonical guardrail
        run: npm run bazel -- run //:canonical_sitewide

  ai-paths-canonical:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run AI Paths canonical guardrail
        run: npm run bazel -- run //:ai_paths_canonical

  observability:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run observability quality gate
        run: npm run bazel -- run //:observability

      - name: Upload observability check logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: observability-check-logs
          if-no-files-found: warn
          path: |
            logs/observability-check.log
            logs/observability-check.error.log

  ui-consolidation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run UI consolidation guardrail
        run: npm run bazel -- run //:ui_consolidation

  scanner-contracts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run scanner contracts
        run: npm run bazel -- run //:scanner_contracts

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run bazel -- run //:lint

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run typecheck
        run: npm run bazel -- run //:typecheck

  unit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit test project
        run: npm run bazel -- run //:unit

  unit-domain-timings:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit domain timing suite
        run: npm run bazel -- run //:unit_domain_timings

      - name: Upload unit domain timing report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-domain-timings-report
          if-no-files-found: warn
          path: |
            docs/metrics/unit-domain-timings-latest.json
            docs/metrics/unit-domain-timings-latest.md

  critical-flows:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run critical flow regression suite
        run: npm run bazel -- run //:critical_flows

      - name: Upload critical flow report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: critical-flow-regression-report
          if-no-files-found: warn
          path: |
            docs/metrics/critical-flow-tests-latest.json
            docs/metrics/critical-flow-tests-latest.md

  security-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run security smoke suite
        run: npm run bazel -- run //:security_smoke

      - name: Upload security smoke report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-smoke-report
          if-no-files-found: warn
          path: |
            docs/metrics/security-smoke-latest.json
            docs/metrics/security-smoke-latest.md

  accessibility-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run accessibility smoke suite
        run: npm run bazel -- run //:accessibility_smoke

      - name: Upload accessibility smoke report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: accessibility-smoke-report
          if-no-files-found: warn
          path: |
            docs/metrics/accessibility-smoke-latest.json
            docs/metrics/accessibility-smoke-latest.md

  integration-mongo:
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --quiet --eval 'db.runCommand({ ping: 1 }).ok'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      APP_DB_PROVIDER: mongodb
      PRODUCT_DB_PROVIDER: mongodb
      NOTE_DB_PROVIDER: mongodb
      INTEGRATION_DB_PROVIDER: mongodb
      AUTH_DB_PROVIDER: mongodb
      MONGODB_URI: mongodb://localhost:27017
      MONGODB_DB: app_test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Mongo integration project
        run: npm run bazel -- run //:integration_mongo

      - name: Upload Mongo integration report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-mongo-report
          if-no-files-found: warn
          path: |
            docs/metrics/integration-mongo-latest.json
            docs/metrics/integration-mongo-latest.md
