name: Validator Docs

on:
  pull_request:
    paths:
      - 'src/features/products/components/settings/validator-settings/**'
      - 'src/features/products/components/settings/ValidatorSettings.tsx'
      - 'src/features/products/validation-engine/**'
      - 'src/features/admin/pages/AdminGlobalValidatorPage.tsx'
      - 'src/features/admin/pages/AdminValidatorPatternListsPage.tsx'
      - 'src/features/admin/pages/validator-scope.ts'
      - 'scripts/docs/**'
      - 'docs/validator/**'
      - 'package.json'
      - 'package-lock.json'
  push:
    branches:
      - main
    paths:
      - 'src/features/products/components/settings/validator-settings/**'
      - 'src/features/products/components/settings/ValidatorSettings.tsx'
      - 'src/features/products/validation-engine/**'
      - 'src/features/admin/pages/AdminGlobalValidatorPage.tsx'
      - 'src/features/admin/pages/AdminValidatorPatternListsPage.tsx'
      - 'src/features/admin/pages/validator-scope.ts'
      - 'scripts/docs/**'
      - 'docs/validator/**'
      - 'package.json'
      - 'package-lock.json'

jobs:
  validator-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check validator docs coverage
        run: npm run docs:validator:check

      - name: Generate validator docs
        run: npm run docs:validator:generate
