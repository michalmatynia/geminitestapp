services:
  db:
    image: mongo:7
    environment:
      MONGO_INITDB_DATABASE: app
    ports:
      - "27017:27017"
    volumes:
      - mongodb:/data/db

  web:
    build: .
    environment:
      APP_DB_PROVIDER: mongodb
      AUTH_DB_PROVIDER: mongodb
      MONGODB_URI: mongodb://db:27017/app
      MONGODB_DB: app
      NODE_ENV: production
      PORT: "3000"
    ports:
      - "3000:3000"
    depends_on:
      - db

volumes:
  mongodb:
