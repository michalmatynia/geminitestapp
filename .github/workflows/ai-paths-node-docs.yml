name: AI Paths Node Docs

on:
  pull_request:
    paths:
      - 'src/shared/lib/ai-paths/core/docs/**'
      - 'src/shared/lib/ai-paths/core/definitions/docs-snippets.ts'
      - 'src/shared/lib/ai-paths/core/validation-engine/**'
      - 'src/shared/lib/ai-paths/core/runtime/node-runtime-kernel.ts'
      - 'scripts/ai-paths/check-canonical.mjs'
      - 'scripts/ai-paths/canonical-manifest-paths-utils.mjs'
      - 'scripts/docs/**'
      - 'docs/AI_PATHS.md'
      - 'docs/ai-paths/node-code-objects-v2/**'
      - 'docs/ai-paths/node-code-objects-v3/**'
      - 'docs/ai-paths/node-code-objects-v3.md'
      - 'docs/ai-paths/portable-engine-scaffolding.md'
      - 'docs/ai-paths/semantic-grammar/nodes/**'
      - 'docs/ai-paths/node-validator-central-manifest.json'
      - 'docs/ai-paths/tooltip-central-manifest.json'
      - 'docs/ai-paths/tooltip-catalog.json'
      - 'docs/ai-paths/tooltip-catalog.ts'
      - '.nvmrc'
      - 'package.json'
      - 'package-lock.json'
  push:
    branches:
      - main
      - master
    paths:
      - 'src/shared/lib/ai-paths/core/docs/**'
      - 'src/shared/lib/ai-paths/core/definitions/docs-snippets.ts'
      - 'src/shared/lib/ai-paths/core/validation-engine/**'
      - 'src/shared/lib/ai-paths/core/runtime/node-runtime-kernel.ts'
      - 'scripts/ai-paths/check-canonical.mjs'
      - 'scripts/ai-paths/canonical-manifest-paths-utils.mjs'
      - 'scripts/docs/**'
      - 'docs/AI_PATHS.md'
      - 'docs/ai-paths/node-code-objects-v2/**'
      - 'docs/ai-paths/node-code-objects-v3/**'
      - 'docs/ai-paths/node-code-objects-v3.md'
      - 'docs/ai-paths/portable-engine-scaffolding.md'
      - 'docs/ai-paths/semantic-grammar/nodes/**'
      - 'docs/ai-paths/node-validator-central-manifest.json'
      - 'docs/ai-paths/tooltip-central-manifest.json'
      - 'docs/ai-paths/tooltip-catalog.json'
      - 'docs/ai-paths/tooltip-catalog.ts'
      - '.nvmrc'
      - 'package.json'
      - 'package-lock.json'

env:
  BAZEL_REMOTE_CACHE_URL: ${{ secrets.BAZEL_REMOTE_CACHE_URL }}
  BAZEL_REMOTE_CACHE_HEADER: ${{ secrets.BAZEL_REMOTE_CACHE_HEADER }}
  BAZEL_REMOTE_CACHE_UPLOAD_LOCAL_RESULTS: ${{ github.event_name == 'push' && 'true' || 'false' }}

jobs:
  ai-paths-node-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Verify AI Paths node docs and tooltip artifacts
        run: npm run bazel -- run //:ai_paths_node_docs
