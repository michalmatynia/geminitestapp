name: architecture-guardrails

on:
  pull_request:
  push:
    branches:
      - main
      - master

env:
  BAZEL_REMOTE_CACHE_URL: ${{ secrets.BAZEL_REMOTE_CACHE_URL }}
  BAZEL_REMOTE_CACHE_HEADER: ${{ secrets.BAZEL_REMOTE_CACHE_HEADER }}
  BAZEL_REMOTE_CACHE_UPLOAD_LOCAL_RESULTS: ${{ github.event_name == 'push' && 'true' || 'false' }}

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Collect architecture metrics
        run: npm run bazel -- run //:architecture_collect_metrics

      - name: Generate route hotspot report
        run: npm run bazel -- run //:architecture_hotspots

      - name: Enforce critical path performance budgets
        run: npm run bazel -- run //:architecture_critical_paths

      - name: Enforce guardrails
        run: npm run bazel -- run //:architecture_guardrails
