name: Docs Structure

on:
  pull_request:
    paths:
      - 'docs/**'
      - 'scripts/docs/**'
      - '.github/workflows/docs-structure.yml'
      - 'package.json'
      - 'package-lock.json'
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - 'scripts/docs/**'
      - '.github/workflows/docs-structure.yml'
      - 'package.json'
      - 'package-lock.json'

jobs:
  docs-structure:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check docs structure
        run: npm run docs:structure:check
