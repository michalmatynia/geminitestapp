name: weekly-quality-report

on:
  workflow_dispatch:
  schedule:
    - cron: '0 13 * * 1'

env:
  BAZEL_REMOTE_CACHE_URL: ${{ secrets.BAZEL_REMOTE_CACHE_URL }}
  BAZEL_REMOTE_CACHE_HEADER: ${{ secrets.BAZEL_REMOTE_CACHE_HEADER }}
  BAZEL_REMOTE_CACHE_UPLOAD_LOCAL_RESULTS: 'true'

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run weekly quality report
        run: npm run bazel -- run //:weekly_quality_report

      - name: Generate trend index snapshot
        if: always()
        run: npm run bazel -- run //:weekly_trend_index

      - name: Generate weekly duration budget recommendations
        if: always()
        run: npm run bazel -- run //:weekly_duration_budgets

      - name: Upload weekly quality artifacts
        id: upload_weekly_quality_artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: weekly-quality-report
          if-no-files-found: warn
          path: |
            docs/metrics/weekly-quality-latest.json
            docs/metrics/weekly-quality-latest.md

      - name: Upload trend index artifacts
        id: upload_trend_index_artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trend-index-report
          if-no-files-found: warn
          path: |
            docs/metrics/trend-index-latest.json
            docs/metrics/trend-index-latest.md
            docs/metrics/weekly-duration-budget-recommendations-latest.json
            docs/metrics/weekly-duration-budget-recommendations-latest.md
            docs/metrics/weekly-quality-trend-latest.json
            docs/metrics/weekly-quality-trend-latest.md
            docs/metrics/unit-domain-timings-trend-latest.json
            docs/metrics/unit-domain-timings-trend-latest.md
            docs/metrics/lint-domain-checks-trend-latest.json
            docs/metrics/lint-domain-checks-trend-latest.md

      - name: Publish trend artifact links
        if: always()
        env:
          WEEKLY_ARTIFACT_ID: ${{ steps.upload_weekly_quality_artifacts.outputs.artifact-id }}
          TREND_ARTIFACT_ID: ${{ steps.upload_trend_index_artifacts.outputs.artifact-id }}
          RUN_ARTIFACTS_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}#artifacts
        run: |
          {
            echo "## Weekly Quality Artifacts"
            echo
            if [ -n "$WEEKLY_ARTIFACT_ID" ]; then
              echo "- [Weekly quality report artifact](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts/$WEEKLY_ARTIFACT_ID)"
            else
              echo "- Weekly quality report artifact: unavailable"
            fi
            if [ -n "$TREND_ARTIFACT_ID" ]; then
              echo "- [Trend index artifact](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts/$TREND_ARTIFACT_ID)"
            else
              echo "- Trend index artifact: unavailable"
            fi
            echo "- [All run artifacts]($RUN_ARTIFACTS_URL)"
            echo
            echo "### Trend Index Files"
            echo "- \`docs/metrics/trend-index-latest.md\`"
            echo "- \`docs/metrics/trend-index-latest.json\`"
            echo "- \`docs/metrics/weekly-duration-budget-recommendations-latest.md\`"
            echo "- \`docs/metrics/weekly-duration-budget-recommendations-latest.json\`"
            echo "- \`docs/metrics/weekly-quality-trend-latest.md\`"
            echo "- \`docs/metrics/unit-domain-timings-trend-latest.md\`"
            echo "- \`docs/metrics/lint-domain-checks-trend-latest.md\`"
            if [ -f docs/metrics/weekly-duration-budget-recommendations-latest.json ]; then
              node -e "const fs=require('fs'); const p='docs/metrics/weekly-duration-budget-recommendations-latest.json'; const payload=JSON.parse(fs.readFileSync(p,'utf8')); const s=payload.summary??{}; const blocking=Array.isArray(s.blockingChecks)&&s.blockingChecks.length>0?s.blockingChecks.join(', '):'-'; const cadence=Number.isFinite(s.weeklyCadenceDays)?s.weeklyCadenceDays:7; const eta=typeof s.estimatedReadyDateWeeklyCadence==='string'?s.estimatedReadyDateWeeklyCadence:'-'; console.log(''); console.log('### Duration Recalibration Readiness'); console.log('- Status: '+(s.status??'unknown')); console.log('- Required readiness: '+(s.checksReadyRequired??'-')+'/'+(s.checksRequired??'-')); console.log('- Required runs needed (minimum): '+(s.requiredRunsNeeded??'-')); console.log('- Estimated readiness date ('+cadence+'-day cadence): '+eta); console.log('- Blocking checks: '+blocking);" 
            else
              echo
              echo "### Duration Recalibration Readiness"
              echo "- Recommendation snapshot missing in this run."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
