name: bun-compatibility

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: '.bun-version'

      - name: Cache Bun package cache
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-install-cache-${{ hashFiles('.nvmrc', '.node-version', '.tool-versions', '.bun-version', 'bunfig.toml', 'package-lock.json', 'bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-install-cache-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run Bun compatibility check
        run: bun run check:bun:compat
